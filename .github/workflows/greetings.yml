name: Greetings

on: [pull_request, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          👋 Welcome and thank you for opening your first issue! We appreciate your feedback and will get back to you as soon as possible.
        pr-message: |
          🎉 Thank you for your first contribution to the **Fibonacci Series** repository! 🙏

          We're excited to review your pull request. To help us process it quickly, please make sure:
          - ✅ Your code file follows the naming convention: `<language>_fibonacci.<ext>` inside `fibonacci_series/<Language>/`
          - ✅ Your program accepts user input for the number of terms (at least 100 terms supported)
          - ✅ You've added your name to [Contributors.md](Contributors.md)

          We'll review and merge your contribution soon. Happy coding! 💻✨

